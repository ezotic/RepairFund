<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepairFund - Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link id="theme-stylesheet" rel="stylesheet" href="/css/dracula.css">
  <script src="/js/theme-init.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/dashboard.html">RepairFund</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" id="adminLink" style="display: none;">Admin Panel</a>
          </li>
          <li class="nav-item">
            <button class="nav-link btn btn-link" id="logoutBtn">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row mb-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Total Fund Balance</h5>
            <h2 class="text-success" id="totalBalance">$0.00</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title mb-0">Add Contribution</h5>
          </div>
          <div class="card-body">
            <div id="error" class="alert alert-danger d-none" role="alert"></div>
            <div id="success" class="alert alert-success d-none" role="alert">Contribution added!</div>

            <form id="entryForm">
              <div class="mb-3">
                <label for="amount" class="form-label">Amount ($)</label>
                <input type="number" class="form-control" id="amount" step="0.01" min="0" required>
              </div>

              <div class="mb-3">
                <label for="entryDate" class="form-label">Date</label>
                <input type="date" class="form-control" id="entryDate" required>
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Description (Optional)</label>
                <input type="text" class="form-control" id="description" placeholder="e.g., Repair parts">
              </div>

              <button type="submit" class="btn btn-success w-100">Add Contribution</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title mb-0">Your Account</h5>
          </div>
          <div class="card-body">
            <p><strong>Username:</strong> <span id="username"></span></p>
            <p><strong>Role:</strong> <span id="userRole" class="badge bg-primary"></span></p>
            <button type="button" class="btn btn-outline-secondary w-100" id="changePasswordBtn">Change Password</button>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title mb-0">All Contributions</h5>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-striped table-hover">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>User</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="entriesTable">
                  <tr>
                    <td colspan="5" class="text-center text-muted">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
