<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepairFund - Change Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link id="theme-stylesheet" rel="stylesheet" href="/css/dracula.css">
  <script src="/js/theme-init.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
          <div class="card-body p-5">
            <h2 class="card-title text-center mb-4">Change Password</h2>
            <p class="text-center text-muted mb-4">Your password has been reset. Please set a new password.</p>

            <div id="error" class="alert alert-danger d-none" role="alert"></div>
            <div id="success" class="alert alert-success d-none" role="alert">Password changed successfully!</div>

            <form id="changePasswordForm">
              <div class="mb-3">
                <label for="currentPassword" class="form-label">Current Password</label>
                <input type="password" class="form-control" id="currentPassword" required autofocus>
              </div>

              <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" required>
                <small class="form-text text-muted d-block mt-2">Minimum 8 characters</small>
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" required>
              </div>

              <button type="submit" class="btn btn-primary w-100">Change Password</button>
            </form>

            <hr class="my-4">
            <button type="button" class="btn btn-secondary w-100" id="logoutBtn">Back to Login</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/change-password.js"></script>
</body>
</html>
